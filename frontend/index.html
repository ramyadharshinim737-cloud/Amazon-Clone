<!DOCTYPE html>
<html>
<head>
    <title>Amazon Clone</title>
    <style>
        .card img { 
    width: 100%; 
    height: 200px; 
    object-fit: contain; 
    margin-bottom: 10px;
}
.product-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
    gap: 20px; 
    padding: 20px; 
}
    </style>
</head>
<body>
    <div class="navbar"><h2>Amazon Clone</h2></div>
    <div class="product-grid" id="products"></div>

    <script>
        // Unga EC2 IP-ah inga update pannunga
        fetch('/https://13.53.37.138  ///api/products')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('products');
                data.forEach(p => {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${p.image}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <p>$${p.price}</p>
                            <button onclick="alert('Added to Cart!')">Add to Cart</button>
                        </div>`;
                });
            });
    </script>
</body>
</html>
